<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Expense Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1600&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    color:white;
    overflow-x:hidden;
}

/* Animated Background */

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,rgba(255,255,255,0.08) 2px,transparent 3px);

    background-size:50px 50px;
    animation:moveBg 20s linear infinite;
    z-index:-1;
}

@keyframes moveBg{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-200px);
    }
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.title{
    text-align:center;
    margin-bottom:30px;
    animation:fadeIn 1s ease;
}

.title h1{
    font-size:45px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    margin-bottom:12px;
}

.form-box{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
}

.form-box input,
.form-box select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    outline:none;
}

.form-box button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    transform:scale(1.02);
}

.transactions{
    display:grid;
    gap:18px;
}

.transaction{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:18px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:slideIn 0.5s ease;
}

.transaction-info h3{
    margin-bottom:5px;
}

.transaction small{
    color:#ddd;
}

.amount{
    font-size:20px;
    font-weight:600;
}

.delete-btn{
    margin-left:15px;
    background:red;
    color:white;
    border:none;
    width:35px;
    height:35px;
    border-radius:50%;
    cursor:pointer;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideIn{

    from{
        opacity:0;
        transform:translateX(-40px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>💰 Expense Tracker Dashboard</h1>
    </div>

    <div class="dashboard">

        <div class="card">
            <h2>Total Balance</h2>
            <h1 id="balance">₹0</h1>
        </div>

        <div class="card">
            <h2>Total Income</h2>
            <h1 id="income">₹0</h1>
        </div>

        <div class="card">
            <h2>Total Expense</h2>
            <h1 id="expense">₹0</h1>
        </div>

    </div>

    <div class="form-box">

        <input type="text"
        id="title"
        placeholder="Enter Title">

        <input type="number"
        id="amount"
        placeholder="Enter Amount">

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <select id="category">
            <option>Food</option>
            <option>Shopping</option>
            <option>Travel</option>
            <option>Education</option>
            <option>Entertainment</option>
        </select>

        <button onclick="addTransaction()">
            Add Transaction
        </button>

    </div>

    <div class="transactions"
    id="transactions">
    </div>

</div>

<script>

let balance = 0;
let income = 0;
let expense = 0;

function addTransaction(){

    let title =
    document.getElementById("title").value;

    let amount =
    Number(document.getElementById("amount").value);

    let type =
    document.getElementById("type").value;

    let category =
    document.getElementById("category").value;

    if(title === "" || amount === 0){

        alert("Please fill all fields");

        return;
    }

    if(type === "income"){

        income += amount;
        balance += amount;
    }

    else{

        expense += amount;
        balance -= amount;
    }

    updateUI();

    let transaction =
    document.createElement("div");

    transaction.classList.add("transaction");

    transaction.innerHTML = `

        <div class="transaction-info">

            <h3>${title}</h3>

            <small>
            ${category} • ${type}
            </small>

        </div>

        <div>

            <span class="amount">
            ₹${amount}
            </span>

            <button class="delete-btn"
            onclick="deleteTransaction(this,
            ${amount},
            '${type}')">
            X
            </button>

        </div>

    `;

    document.getElementById("transactions")
    .prepend(transaction);

    document.getElementById("title").value="";
    document.getElementById("amount").value="";
}

function updateUI(){

    document.getElementById("balance")
    .innerText = "₹" + balance;

    document.getElementById("income")
    .innerText = "₹" + income;

    document.getElementById("expense")
    .innerText = "₹" + expense;
}

function deleteTransaction(button,amount,type){

    if(type === "income"){

        income -= amount;
        balance -= amount;
    }

    else{

        expense -= amount;
        balance += amount;
    }

    updateUI();

    button.parentElement.parentElement.remove();
}

</script>

</body>
</html>
